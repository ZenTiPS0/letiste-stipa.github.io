<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <title>Webkamera</title>
    <link rel="stylesheet" href="source/style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="source/script.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo" data-aos="zoom-in" data-aos-duration="1000" style="display: flex; align-items: center; position: relative;">
                <span style="position: relative; z-index: 1;">Letiště Štípa</span>
                <img src="img/logo.png" alt="Logo Štípa Letiště" style="height: 120px; position: absolute; left: 110%; top: 50%; transform: translateY(-50%); z-index: 0;">
            </div>
            
            <div class="links">
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="100"><a href="index.html">DOMŮ</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="200"><a href="letiste.html">LETIŠTĚ</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300"><a href="meteostanice.html">METEOSTANICE</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="400"><a href="webkamera.html">WEBKAMERA</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="500"><a href="galerie.html">GALERIE</a></div>
                <div class="link contact-btn" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="600"><a href="kontakt.html">KONTAKT</a></div>
            </div>
            <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        </div>
        <div class="dropdown">
            <div class="links">
                <a href="index.html">DOMŮ</a>
                <a href="letiste.html">LETIŠTĚ</a>
                <a href="meteostanice.html">METEOSTANICE</a>
                <a href="webkamera.html">WEBKAMERA</a>
                <a href="galerie.html">GALERIE</a>
                <a href="kontakt.html">KONTAKT</a>
                <i class="fa-solid fa-xmark cancel" onclick="cancel()"></i>
            </div>
        </div>
    </nav>
    <section class="container">
        <div class="main-container">
            <div class="content camera-page">
                <h1 class="section-header" data-aos="fade-left" data-aos-duration="1000" data-aos-delay="800">Webkamera <span>Letiště</span></h1>
                <div id="login-overlay" class="login-overlay" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="900">
                <div class="login-box">
                    <span id="login-close" class="login-close">&times;</span>
                    <h2>Přihlášení ke kameře</h2>
                    <input type="password" id="cam-password" placeholder="Heslo" />
                    <button id="cam-login-btn">Přihlásit</button>
                </div>
            </div>

            <div id="camera-controls" style="display:none; margin-top:20px;">
                <button onclick="prevCam()">&larr; Předchozí</button>
                <button onclick="nextCam()">Další &rarr;</button>
            </div>
            <div id="camera-view" style="margin-top:20px;">
                <!-- image will appear here -->
            </div>
        </div>
    </div>
        </div>
    </section>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
  AOS.init({offset:0});

  const cams = [
    'https://placekitten.com/800/450',
    'https://placekitten.com/801/450',
    'https://placekitten.com/802/450'
  ];
  let current = 0;

  function showCam(idx) {
    const container = document.getElementById('camera-view');
    container.innerHTML = '<img src="' + cams[idx] + '" alt="Webkamera" style="max-width:100%; border:1px solid #004080;"/>';
  }

  function nextCam() {
    current = (current + 1) % cams.length;
    showCam(current);
  }
  function prevCam() {
    current = (current - 1 + cams.length) % cams.length;
    showCam(current);
  }

  function initCameraPage() {
    const btn = document.getElementById('cam-login-btn');
    const overlay = document.getElementById('login-overlay');
    btn.addEventListener('click', () => {
      const pwd = document.getElementById('cam-password').value;
      if (pwd === 'kamera123') {
        overlay.style.display = 'none';
        document.getElementById('camera-controls').style.display = 'block';
        showCam(current);
      } else {
        alert('Heslo je nesprávné.');
      }
    });
    // allow clicking outside box or on close icon to hide overlay
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay || e.target.id === 'login-close') {
        overlay.style.display = 'none';
      }
    });
  }

  initCameraPage();
</script>
</body>
</html>
