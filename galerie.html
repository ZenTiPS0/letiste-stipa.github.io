<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <title>Galerie</title>
    <link rel="stylesheet" href="source/style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="source/script.js"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo" data-aos="zoom-in" data-aos-duration="1000" style="display: flex; align-items: center; position: relative;">
                <span style="position: relative; z-index: 1;">Letiště Štípa</span>
                <img src="img/logo.png" alt="Logo Štípa Letiště" style="height: 120px; position: absolute; left: 110%; top: 50%; transform: translateY(-50%); z-index: 0;">
            </div>
            
            <div class="links">
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="100"><a href="index.html">DOMŮ</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="200"><a href="letiste.html">LETIŠTĚ</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300"><a href="meteostanice.html">METEOSTANICE</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="400"><a href="webkamera.html">WEBKAMERA</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="500"><a href="galerie.html">GALERIE</a></div>
                <div class="link contact-btn" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="600"><a href="kontakt.html">KONTAKT</a></div>
            </div>
            <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        </div>
        <div class="dropdown">
            <div class="links">
                <a href="index.html">DOMŮ</a>
                <a href="letiste.html">LETIŠTĚ</a>
                <a href="meteostanice.html">METEOSTANICE</a>
                <a href="galerie.html">GALERIE</a>
                <a href="webkamera.html">WEBKAMERA</a>
                <a href="kontakt.html">KONTAKT</a>
                <i class="fa-solid fa-xmark cancel" onclick="cancel()"></i>
            </div>
        </div>
    </nav>


<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
  AOS.init({offset:0});
</script>

    <!-- Sidebar s kategoriemi -->
    <div class="sidebar">
        <h3>Kategorie</h3>
        <ul>
            <li onclick="showGallery('letadla')">Letadla</li>
            <li onclick="showGallery('letiste')">Letiště</li>
            <li onclick="showGallery('piloti')">Piloti</li>
        </ul>
    </div>

    <!-- Galerie -->
    <section class="container">
        <div class="content">
            <div class="gallery">
                <h2 class="box-header">Galerie</h2>

            <div id="letadla" class="gallery-section active">
                <div class="item"><img src="https://www.kosteleckappgletka.cz/img/fotogalerie/24/5.jpg" loading="lazy" onclick="openZoom(this)"></div>
                <div class="item"><img src="https://www.kosteleckappgletka.cz/img/fotogalerie/24/10.jpg" loading="lazy" onclick="openZoom(this)"></div>
            </div>

            <div id="letiste" class="gallery-section">
                <div class="item"><img src="https://www.kosteleckappgletka.cz/img/fotogalerie/24/19.jpg" loading="lazy" onclick="openZoom(this)"></div>
                <div class="item"><img src="https://www.kosteleckappgletka.cz/img/fotogalerie/24/27.jpg" loading="lazy" onclick="openZoom(this)"></div>
            </div>

            <div id="piloti" class="gallery-section">
                <div class="item"><img src="https://www.kosteleckappgletka.cz/img/fotogalerie/24/25.jpg" loading="lazy" onclick="openZoom(this)"></div>
            </div>
        </div>
    </div>

    </section>

    <!-- Zvětšený obrázek -->
    <div id="zoomOverlay" class="zoom-overlay" onclick="closeZoom()">
        <img id="zoomImg" src="">
    </div>

</body>
</html>
